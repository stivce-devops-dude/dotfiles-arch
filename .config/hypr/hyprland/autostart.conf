# Autostart — daemons start only if not already running (safe on reload)
exec-once = bash -c 'pgrep -x waybar || waybar'
exec-once = bash -c 'pgrep -x awww-daemon || { awww-daemon --format xrgb & sleep 0.5; awww img $HOME/Pictures/wallpapers/minimalno.jpg; }'
exec-once = bash -c 'pgrep -x hyprpanel || $HOME/.config/hypr/hyprpanel/start-hyprpanel'
exec-once = bash -c 'pgrep -x tumblerd || tumblerd'
exec-once = bash -c 'pgrep -x udiskie || udiskie --tray --automount'
exec-once = bash -c 'pgrep -x xsettingsd || xsettingsd'
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme WhiteSur-Dark
exec-once = gsettings set org.gnome.desktop.interface icon-theme WhiteSur-dark
