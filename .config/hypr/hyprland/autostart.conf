# Autostart — daemons start only if not already running (safe on reload)
exec-once = bash -c 'pgrep -x waybar || waybar'
exec-once = bash -c 'pgrep -x awww-daemon || awww-daemon'
exec-once = bash -c 'pgrep -x hyprpanel || $HOME/.config/hypr/hyprpanel/start-hyprpanel'
exec-once = bash -c 'pgrep -x tumblerd || tumblerd'
exec-once = bash -c 'pgrep -x udiskie || udiskie --tray --automount'
exec-once = bash -c 'pgrep -x xsettingsd || xsettingsd'
