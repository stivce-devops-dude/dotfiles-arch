# Set programs
$terminal = kitty
$fileManager = nautilus
$menu = fuzzel

env = XCURSOR_THEME,Volantes_Light
env = XCURSOR_SIZE,34
env = HYPRCURSOR_SIZE,34

# Dark mode
env = GTK_THEME,WhiteSur-Dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum-dark
env = ADW_DISABLE_PORTAL,1

# Electron / Chromium Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto