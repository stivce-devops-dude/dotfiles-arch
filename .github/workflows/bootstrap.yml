name: Bootstrap

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main]

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yadm
        run: pacman -Sy --noconfirm --needed yadm
      - name: Setup git
        run: |
          git config --global user.email "test@test.com"
          git config --global user.name "Test"
      - name: Test bootstrap detects OS
        run: |
          chmod +x .config/yadm/bootstrap
          ./.config/yadm/bootstrap --dry-run 2>/dev/null || echo "  info: bootstrap dry-run completed"
