name: Config Validation

on:
  push:
    branches: [minimal, gaming]
  pull_request:
    branches: [minimal]

jobs:
  config-validation:
    name: Config Validation
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Hyprland config
        run: |
          if [ -f .config/hypr/hyprland.conf ]; then
            echo "  ok: Hyprland config exists"
          else
            echo "  WARN: Hyprland config missing (may be minimal branch)"
          fi
      - name: Validate Fuzzel config
        run: |
          if [ -f .config/fuzzel/fuzzel.ini ]; then
            echo "  ok: Fuzzel config exists"
          else
            echo "  WARN: Fuzzel config missing (may be minimal branch)"
          fi
      - name: Validate gaming script (gaming branch only)
        run: |
          if [ -f install-gaming ]; then
            bash -n install-gaming && echo "  ok: install-gaming syntax"
          else
            echo "  INFO: install-gaming not found (minimal branch)"
          fi
