name: Lint

on:
  push:
    branches: [minimal, gaming]
  pull_request:
    branches: [minimal]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pacman -Sy --noconfirm --needed bash zsh shellcheck
      - name: shellcheck bootstrap scripts
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            shellcheck --severity error "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find .config/yadm -type f \( -name "bootstrap*" -o -path "*/bootstrap.d/*" \) -print0)
          [ "$fail" -eq 0 ] || exit 1
      - name: shellcheck .local bin scripts
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            shellcheck --severity error "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find .local -type f -executable -print0 2>/dev/null)
          [ "$fail" -eq 0 ] || exit 1
      - name: shellcheck ci scripts
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            shellcheck --severity error "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find ci -type f -executable -print0 2>/dev/null)
          [ "$fail" -eq 0 ] || exit 1
