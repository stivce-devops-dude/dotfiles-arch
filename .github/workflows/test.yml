name: Test dotfiles

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------------------------
  # Lint — syntax check all shell scripts
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pacman -Sy --noconfirm --needed bash zsh
      - name: bash -n bootstrap scripts
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            bash -n "$f" && echo "  ok: $f" || { echo "  FAIL: $f"; fail=1; }
          done < <(find .config/yadm -type f \( -name "bootstrap*" -o -path "*/bootstrap.d/*" \) -print0)
          [ "$fail" -eq 0 ] || exit 1

  # -------------------------------------------------------------------------
  # Validate configs
  # -------------------------------------------------------------------------
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Hyprland config
        run: |
          if [ -f .config/hypr/hyprland.conf ]; then
            echo "  ok: Hyprland config exists"
          else
            echo "  FAIL: Hyprland config missing"
            exit 1
          fi
      - name: Validate Fuzzel config
        run: |
          if [ -f .config/fuzzel/fuzzel.ini ]; then
            echo "  ok: Fuzzel config exists"
          else
            echo "  FAIL: Fuzzel config missing"
            exit 1
          fi
      - name: Validate gaming script
        run: |
          if [ -f install-gaming ]; then
            bash -n install-gaming && echo "  ok: install-gaming syntax" || { echo "  FAIL: install-gaming"; exit 1; }
          fi

  # -------------------------------------------------------------------------
  # Test packages in pacman
  # -------------------------------------------------------------------------
  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout general dotfiles
        run: git clone --depth 1 https://github.com/stivce-devops-dude/dotfiles.git ../dotfiles
      - name: Sync pacman
        run: pacman -Sy --noconfirm
      - name: Check core packages exist in pacman
        run: |
          CORE="$PWD/../dotfiles/.config/yadm/packages/core.txt"
          while IFS= read -r pkg; do
            [[ -z "$pkg" || "$pkg" == \#* ]] && continue
            if pacman -Si "$pkg" &>/dev/null; then
              echo "  ok: $pkg in pacman"
            else
              echo "  WARN: $pkg not in pacman (may be AUR)"
            fi
          done < "$CORE"
      - name: Check UI packages exist in pacman
        run: |
          UI_PKGS=(
            hyprland
            hyprlock
            waybar
            fuzzel
            kitty
            matugen
            whitesur-icon-theme
            whitesur-gtk-theme
            graphite-gtk-theme
          )
          for pkg in "${UI_PKGS[@]}"; do
            if pacman -Si "$pkg" &>/dev/null; then
              echo "  ok: $pkg in pacman"
            else
              echo "  WARN: $pkg not in pacman (may be AUR)"
            fi
          done
      - name: Check gaming packages exist in pacman
        run: |
          GAMING_PKGS=(
            umu-launcher
            wine
            gamescope
          )
          for pkg in "${GAMING_PKGS[@]}"; do
            if pacman -Si "$pkg" &>/dev/null; then
              echo "  ok: $pkg in pacman"
            else
              echo "  WARN: $pkg not in pacman (may be AUR)"
            fi
          done

  # -------------------------------------------------------------------------
  # Bootstrap test
  # -------------------------------------------------------------------------
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yadm
        run: pacman -Sy --noconfirm --needed yadm
      - name: Setup git
        run: |
          git config --global user.email "test@test.com"
          git config --global user.name "Test"
      - name: Test bootstrap detects OS
        run: |
          chmod +x .config/yadm/bootstrap
          ./.config/yadm/bootstrap --dry-run 2>/dev/null || echo "  info: bootstrap dry-run completed"

  # -------------------------------------------------------------------------
  # Test Arch Linux
  # -------------------------------------------------------------------------
  test-arch:
    name: Test Arch
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: pacman -Sy --noconfirm --needed zsh fzf starship neovim git
      - name: Deploy dotfiles
        run: |
          chmod +x ci/deploy-dotfiles.sh
          ci/deploy-dotfiles.sh linux-arch
      - name: Generate fzf integration
        run: |
          if fzf --zsh >/dev/null 2>&1; then fzf --zsh > "$HOME/.fzf.zsh"
          else touch "$HOME/.fzf.zsh"; fi
      - name: Test starship
        run: |
          starship help >/dev/null 2>&1 && echo "  ok: starship works" || { echo "  FAIL: starship"; exit 1; }
      - name: Run tests
        run: zsh ci/test-zshrc.zsh
