name: Validate

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Hyprland config
        run: |
          if [ -f .config/hypr/hyprland.conf ]; then
            echo "  ok: Hyprland config exists"
          else
            echo "  FAIL: Hyprland config missing"
            exit 1
          fi
      - name: Validate Fuzzel config
        run: |
          if [ -f .config/fuzzel/fuzzel.ini ]; then
            echo "  ok: Fuzzel config exists"
          else
            echo "  FAIL: Fuzzel config missing"
            exit 1
          fi
      - name: Validate gaming script
        run: |
          if [ -f install-gaming ]; then
            bash -n install-gaming && echo "  ok: install-gaming syntax" || { echo "  FAIL: install-gaming"; exit 1; }
          fi
